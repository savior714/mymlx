name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install just
        run: brew install just

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Stack policy audit
        run: just audit-stack

      - name: Lint/typecheck/test
        run: just ci
